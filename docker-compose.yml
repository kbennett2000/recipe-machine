services:
  app:
    build: .
    image: recipe-machine:dev
    container_name: recipe-machine
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      # Markdown recipe files live outside the app — mount them in.
      - ./recipes:/var/www/html/recipes
      # Persist the SQLite database across container rebuilds.
      - sqlite-data:/var/www/html/database
    restart: unless-stopped

volumes:
  sqlite-data:
