services:
  app:
    build: .
    image: recipe-machine:dev
    container_name: recipe-machine
    ports:
      # Host-facing port is configurable via APP_PORT in .env (default 8000).
      # The container-internal port stays at 8000 — it's an implementation
      # detail of `php artisan serve` inside the container.
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      # Markdown recipe files live outside the app — mount them in so
      # edits show up without a container rebuild.
      - ./recipes:/var/www/html/recipes
      # Persist the SQLite file (only) across container rebuilds. Scoping
      # the bind to the .sqlite file — rather than the whole database/
      # directory — means new migrations under database/migrations/ baked
      # into the image are visible immediately, no `docker compose down -v`
      # required. (Phase 10 fix for the named-volume migration shadowing
      # issue noted in TODO.md.)
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
    restart: unless-stopped
